<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小丑牌 · V2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* === V1 保留 tokens === */
  :root {
    --color-table:   #2d5a3d;
    --color-accent:  #e8682a;
    --color-discard: #a83232;
    --color-gold:    #d4a017;
    --color-card-red: #d33f3f;
    --color-card-bg: #fbfaf7;
    --color-score:   #5dd67a;
    --radius-card:   12px;
    --radius-btn:    999px;
    --ease-card:     200ms ease;

    /* === V2 新增 tokens === */
    --color-rarity-common:    #6b7db3;
    --color-rarity-uncommon:  #4ade80;
    --color-rarity-rare:      #fb923c;
    --color-rarity-legendary: #a855f7;
    --color-boss:             #f87171;
    --color-ante:             #a855f7;
    --color-coming-soon:      #60a5fa;
    --joker-bg-common:        #2a2a3a;
    --joker-bg-uncommon:      #1a2e1a;
    --joker-bg-rare:          #2e1a1a;
    --joker-bg-legendary:     #2a1a3a;
    --radius-joker:           10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    color: #1a1a1a;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    /* Bug A fix: 移除 padding，让游戏铺满整个视口 */
    padding: 0;
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .game-viewport {
    /* Bug A fix: 铺满整个视口，大屏用 max-width/max-height 防止卡牌过大 */
    width: 100vw;
    height: 100vh;
    max-width: 1920px;
    max-height: 1200px;
    background: var(--color-table);
    /* 只有 max-width 生效时才显示圆角，全屏时去掉圆角 */
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: none;
    position: relative;
    background-image:
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,.25) 0%, transparent 70%),
      repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,.012) 20px, rgba(255,255,255,.012) 21px);
  }

  /* === HUD（V2：6 格） === */
  .hud {
    display: flex;
    align-items: center;
    height: 64px;
    padding: 0 16px;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
    border-bottom: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
    z-index: 5;
    position: relative;
  }
  .hud-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid rgba(255,255,255,.1);
    padding: 0 6px;
  }
  .hud-item:last-child { border-right: none; }
  .hud-label {
    font-size: 9px;
    color: rgba(255,255,255,.55);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .hud-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }
  .hud-value.target  { color: var(--color-gold); }
  .hud-value.score   { color: var(--color-score); }
  .hud-value.plays   { color: var(--color-accent); }
  .hud-value.discards{ color: #e06060; }
  .hud-value.money   { color: var(--color-gold); font-size: 18px; }
  .hud-value.ante    { color: var(--color-ante); font-size: 12px; line-height: 1.4; text-align: center; }
  .hud-value.ante .boss-blind-label { color: var(--color-boss); }

  /* === 游戏主体区域（Joker竖栏 + 主区域） === */
  .game-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    position: relative;
  }

  /* === Joker 槽位区（左侧 110px） === */
  .joker-slot-area {
    width: 110px;
    flex-shrink: 0;
    background: rgba(0,0,0,.2);
    border-right: 1px solid rgba(255,255,255,.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 6px;
    gap: 6px;
    overflow: hidden;
  }
  .joker-slot-label {
    font-size: 9px;
    color: rgba(255,255,255,.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .joker-slot {
    width: 94px;
    height: 100px;
    border-radius: var(--radius-joker);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
    position: relative;
    padding: 5px 3px 5px;
  }
  .joker-slot.empty {
    border: 1.5px dashed rgba(255,255,255,.2);
    background: rgba(255,255,255,.02);
    color: rgba(255,255,255,.2);
    font-size: 18px;
    cursor: default;
  }
  /* 稀有度样式，通过 data-rarity 属性选择器 */
  .joker-slot[data-rarity="common"] {
    background: var(--joker-bg-common);
    box-shadow: 0 0 0 2px var(--color-rarity-common), 0 4px 12px rgba(0,0,0,.4);
  }
  .joker-slot[data-rarity="uncommon"] {
    background: var(--joker-bg-uncommon);
    box-shadow: 0 0 0 2px var(--color-rarity-uncommon), 0 4px 12px rgba(74,222,128,.2);
  }
  .joker-slot[data-rarity="rare"] {
    background: var(--joker-bg-rare);
    box-shadow: 0 0 0 2px var(--color-rarity-rare), 0 4px 12px rgba(251,146,60,.25);
  }
  .joker-slot[data-rarity="legendary"] {
    background: var(--joker-bg-legendary);
    box-shadow: 0 0 0 2px var(--color-rarity-legendary), 0 4px 16px rgba(168,85,247,.4);
    animation: legendary-pulse 2s ease-in-out infinite;
  }
  @keyframes legendary-pulse {
    0%,100%{ box-shadow: 0 0 0 2px #a855f7, 0 4px 16px rgba(168,85,247,.4); }
    50%    { box-shadow: 0 0 0 2px #c084fc, 0 4px 24px rgba(168,85,247,.65); }
  }
  .joker-slot .j-icon  { font-size: 24px; line-height: 1; }
  .joker-slot .j-name  { font-size: 8px; font-weight: 700; color: #fff; text-align: center; line-height: 1.2; }
  .joker-slot .j-eff   { font-size: 7px; color: rgba(255,255,255,.7); text-align: center; line-height: 1.3; }
  .joker-slot .j-sell  {
    position: absolute; bottom: 3px; right: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700;
    color: var(--color-gold); cursor: pointer;
  }
  .joker-slot .j-sell:hover { color: #fff; }
  .joker-slot-full-hint {
    font-size: 9px;
    color: var(--color-accent);
    text-align: center;
    min-height: 12px;
  }

  /* Joker 触发动画 */
  @keyframes joker-trigger {
    0%  { transform: scale(1); }
    50% { transform: scale(1.06); }
    100%{ transform: scale(1); }
  }
  .joker-slot.triggered { animation: joker-trigger 300ms ease; }

  /* === 主区域（出牌 + 手牌 + 操作栏） === */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 出牌区 */
  .play-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.15);
    border-bottom: 1px solid rgba(255,255,255,.06);
    gap: 8px;
    position: relative;
  }
  .hand-type-badge {
    background: rgba(232,104,42,.85);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 18px;
    border-radius: 999px;
    letter-spacing: .5px;
    box-shadow: 0 2px 8px rgba(232,104,42,.4);
    min-height: 26px;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .hand-type-badge.visible { opacity: 1; }
  .play-cards {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .play-placeholder {
    width: 82px;
    height: 118px;
    border-radius: var(--radius-card);
    border: 2px dashed rgba(255,255,255,.18);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.25);
    font-size: 24px;
  }
  .zone-hint {
    font-size: 12px;
    color: rgba(255,255,255,.4);
    letter-spacing: .5px;
  }
  .score-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    margin-top: 2px;
    min-height: 16px;
  }
  /* V2: 计分三段颜色 */
  .score-chips { color: var(--color-score); font-weight: 700; }
  .score-mult  { color: var(--color-accent); font-weight: 700; }
  .score-xmult { color: var(--color-ante); font-weight: 700; }

  /* Boss 限制提示 */
  .boss-restriction-hint {
    font-size: 11px;
    color: var(--color-boss);
    background: rgba(248,113,113,.1);
    border-radius: 6px;
    padding: 4px 12px;
    min-height: 14px;
  }

  /* 手牌区 */
  .hand-zone {
    padding: 10px 16px 8px;
    background: rgba(0,0,0,.2);
    border-top: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .hand-zone-label {
    font-size: 9px;
    color: rgba(255,255,255,.4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hand-cards {
    display: flex;
    gap: 8px;
    justify-content: center;
    min-height: 120px;
  }

  /* 扑克牌 */
  .poker-card {
    width: 78px;
    height: 112px;
    background: var(--color-card-bg);
    border-radius: var(--radius-card);
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.08);
    transition: transform var(--ease-card), box-shadow var(--ease-card);
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .poker-card .corner {
    position: absolute;
    line-height: 1;
    font-weight: 700;
  }
  .poker-card .corner.tl { top: 5px; left: 6px; text-align: left; }
  .poker-card .corner.br {
    bottom: 5px; right: 6px; text-align: right;
    transform: rotate(180deg);
  }
  .poker-card .corner .rank { font-size: 13px; display: block; }
  .poker-card .corner .suit { font-size: 10px; display: block; }
  .poker-card .center-suit {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px; line-height: 1;
  }
  .poker-card.red .corner,
  .poker-card.red .center-suit { color: var(--color-card-red); }
  .poker-card.black .corner,
  .poker-card.black .center-suit { color: #1a1a1a; }
  .poker-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.08);
  }
  .poker-card.selected {
    transform: translateY(-12px);
    box-shadow: 0 0 0 2.5px var(--color-accent), 0 8px 20px rgba(232,104,42,.35);
  }
  .poker-card.selected:hover { transform: translateY(-14px); }
  .poker-card.disabled {
    opacity: .4; cursor: not-allowed;
  }
  .poker-card.disabled:hover {
    transform: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.08);
  }

  /* 操作栏 */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    padding: 10px 24px;
    background: rgba(0,0,0,.3);
    border-top: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: none;
    border-radius: var(--radius-btn);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    padding: 9px 24px;
    transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    letter-spacing: .3px;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-play {
    background: var(--color-accent); color: #fff;
    box-shadow: 0 4px 14px rgba(232,104,42,.45);
  }
  .btn-play:hover:not(:disabled) { box-shadow: 0 6px 18px rgba(232,104,42,.6); }
  .btn-discard {
    background: var(--color-discard); color: #fff;
    box-shadow: 0 4px 14px rgba(168,50,50,.4);
  }
  .btn-discard:hover:not(:disabled) { box-shadow: 0 6px 18px rgba(168,50,50,.55); }
  .btn-neutral {
    background: transparent; color: rgba(255,255,255,.7);
    border: 1.5px solid rgba(255,255,255,.3);
  }
  .btn-neutral:hover:not(:disabled) { border-color: rgba(255,255,255,.6); color: #fff; }
  .btn-gold {
    background: var(--color-gold); color: #1a1a1a;
    box-shadow: 0 4px 14px rgba(212,160,23,.4);
  }

  /* === 全屏覆盖层（盲注选择 / 商店 / 结算） === */
  .overlay-screen {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(20,40,30,.45) 0%, rgba(0,0,0,.55) 100%);
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 250ms ease;
  }
  .overlay-screen.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* === V2: 盲注选择界面 === */
  .blind-select-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    padding: 24px;
  }
  .blind-select-header {
    text-align: center;
  }
  .blind-select-ante {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--color-ante);
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .blind-select-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .blind-cards {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .blind-card {
    width: 200px;
    border-radius: 14px;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    position: relative;
    cursor: default;
    transition: transform 150ms ease;
  }
  .blind-card:hover { transform: translateY(-3px); }
  .blind-small { background: #1a2e1a; border: 2px solid #4ade80; }
  .blind-big   { background: #2e2a1a; border: 2px solid var(--color-gold); }
  .blind-boss  {
    background: #2e1a1a; border: 2px solid var(--color-boss);
    animation: boss-card-pulse 1.5s ease-in-out infinite;
  }
  @keyframes boss-card-pulse {
    0%,100%{ box-shadow: 0 0 0 0 rgba(248,113,113,0); }
    50%    { box-shadow: 0 0 16px 2px rgba(248,113,113,.3); }
  }
  .blind-type-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .8;
  }
  .blind-name { font-size: 15px; font-weight: 700; color: #fff; }
  .blind-score-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,.7);
  }
  .blind-score-line .val { color: var(--color-score); font-weight: 700; }
  .blind-score-line .val-boss { color: var(--color-boss); font-weight: 700; }
  .blind-reward-line { font-size: 11px; color: var(--color-gold); font-weight: 600; }
  .blind-boss-effect {
    font-size: 10px;
    color: #fca5a5;
    background: rgba(248,113,113,.12);
    border-radius: 6px;
    padding: 5px 7px;
    line-height: 1.5;
  }
  .btn-blind {
    display: block; width: 100%;
    border: none; border-radius: 999px;
    padding: 7px 0;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    transition: opacity 150ms ease;
    margin-top: 2px;
  }
  .btn-blind-play  { background: var(--color-accent); color: #fff; }
  .btn-blind-boss  { background: var(--color-boss); color: #1a1a1a; }
  .btn-blind-skip  {
    background: transparent; color: rgba(255,255,255,.5);
    border: 1px solid rgba(255,255,255,.25);
  }
  .btn-blind-skip:hover { border-color: rgba(255,255,255,.5); color: rgba(255,255,255,.8); }
  .btn-blind-disabled {
    background: rgba(255,255,255,.08); color: rgba(255,255,255,.25);
    cursor: not-allowed; border: none;
  }
  /* 跳过时盲注卡灰化 */
  .blind-card.skipped {
    opacity: .35;
    pointer-events: none;
  }

  /* === V2: 商店界面 === */
  .shop-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 24px;
  }
  .shop-container {
    width: 100%;
    max-width: 700px;
    background: #1a2a1a;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .shop-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--color-gold);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .shop-subtitle {
    font-size: 12px;
    color: rgba(255,255,255,.45);
    text-align: center;
    margin-bottom: 4px;
  }
  .shop-money-display {
    font-size: 12px;
    color: rgba(255,255,255,.45);
    text-align: center;
    margin-bottom: 18px;
  }
  .shop-items {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .shop-item {
    width: 140px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: 14px 10px 10px;
    display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    cursor: pointer;
    transition: background 200ms ease, opacity 200ms ease;
    position: relative;
    min-height: 160px;
    justify-content: center;
  }
  .shop-item:hover:not(.disabled):not(.purchased) {
    background: rgba(255,255,255,.1);
  }
  .shop-item.disabled {
    opacity: .45; cursor: not-allowed;
  }
  .shop-item.purchased {
    background: rgba(0,0,0,.3); cursor: not-allowed;
  }
  /* 商店 Joker 稀有度边框 */
  .shop-item[data-rarity="common"]    { border-color: var(--color-rarity-common); }
  .shop-item[data-rarity="uncommon"]  { border-color: var(--color-rarity-uncommon); background: rgba(26,46,26,.5); }
  .shop-item[data-rarity="rare"]      { border-color: var(--color-rarity-rare); background: rgba(46,26,26,.5); }
  .shop-item[data-rarity="legendary"] { border-color: var(--color-rarity-legendary); background: rgba(42,26,58,.5); }
  .shop-item .si-icon  { font-size: 32px; }
  .shop-item .si-name  { font-size: 12px; font-weight: 700; color: #fff; text-align: center; }
  .shop-item .si-desc  { font-size: 10px; color: rgba(255,255,255,.55); text-align: center; line-height: 1.4; }
  .shop-item .si-price {
    background: var(--color-gold); color: #1a1a1a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
  }
  .shop-item .si-purchased {
    font-size: 11px; color: var(--color-score); font-weight: 700;
    display: none;
  }
  .shop-item.purchased .si-purchased { display: block; }
  .shop-item.purchased .si-price { display: none; }

  /* Coming Soon 格 */
  .shop-coming-soon {
    width: 140px;
    background: rgba(96,165,250,.04);
    border: 1.5px dashed rgba(96,165,250,.35);
    border-radius: 12px;
    padding: 14px 10px 10px;
    display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    opacity: .65;
    pointer-events: none;
    min-height: 160px;
    justify-content: center;
  }
  .shop-coming-soon .cs-icon { font-size: 28px; filter: grayscale(1); opacity: .5; }
  .shop-coming-soon .cs-type { font-size: 10px; color: rgba(96,165,250,.7); text-align: center; line-height: 1.4; }
  .shop-coming-soon .cs-label {
    font-size: 9px; font-weight: 700; color: #888;
    letter-spacing: 1px; text-transform: uppercase; text-align: center;
  }

  .shop-actions {
    display: flex; gap: 12px; justify-content: center;
  }

// === 常量（V1 保留 + V2 扩展） ===
// ============================================================

const RANK_ORDER = {

// === V2: 牌型定义改为标准 chips × mult 结构（Level 1 原版数据）===
const HAND_TYPES = {

// === V2: Ante/Blind 分数常量 ===
const ANTE_BASE  = { 1:300, 2:800, 3:2000 };
const BLIND_MULT = { small:1, big:1.5, boss:2 };
const BLIND_REWARD = { small:3, big:4, boss:5 };

function getTargetScore(ante, blind) {
  return Math.floor(ANTE_BASE[ante] * BLIND_MULT[blind]);
}

// === V2: Boss Blind 配置 ===
const BOSS_BLINDS = [
  {
    id: 'the_hook',
    name: 'The Hook',
    desc: '每次出牌后，随机从你的手牌中移除 2 张未出的牌。\n\n不消耗弃牌次数',

    // 出牌后随机移除 2 张手牌
    onAfterPlay: (st) => {
      const removeCount = Math.min(2, st.hand.length);
      if (removeCount <= 0) return;
      const indices = [];
      const pool = [...Array(st.hand.length).keys()];
      for (let i = 0; i < removeCount; i++) {
        const ri = Math.floor(Math.random() * pool.length);
        indices.push(pool.splice(ri, 1)[0]);
      }
      // 从大到小删避免索引错位

      for (const idx of indices) st.hand.splice(idx, 1);

    // 不限制出牌
    canPlay: null
  },
  {
    id: 'the_psychic',
    name: 'The Psychic',
    desc: '强制每次出牌必须选满 5 张，否则无法出牌。',
    icon: '🧿',
    onAfterPlay: null,
    // 选牌数必须 >= 5

  }
];

// === V2: Joker 数据库（8 张）===
const JOKER_DB = [
  {
    id: 'joker_base',
    name: 'Joker',
    rarity: 'common',
    price: 2,
    sellValue: 1,
    icon: '🃏',
    desc: '+4 Mult',
    effect: (ctx) => ({ addMult: 4 })
  },
  {
    id: 'jolly_joker',
    name: 'Jolly Joker',
    rarity: 'common',
    price: 3,
    sellValue: 1,
    icon: '😄',
    desc: '打出含一对时 +8 Chips',
    effect: (ctx) => {
      // 检查手牌型中是否含对子
      const handKey = ctx.handType.key;
      const pairTypes = ['PAIR','TWO_PAIR','FULL_HOUSE','FOUR_KIND','THREE_KIND'];
      if (pairTypes.includes(handKey)) return { addChips: 8 };
      // 更精确：检查 scoringCards 中是否有重复 rank
      const ranks = ctx.scoringCards.map(c => c.rank);
      const counts = {};
      for (const r of ranks) counts[r] = (counts[r]||0)+1;
      const hasPair = Object.values(counts).some(v => v >= 2);
      return hasPair ? { addChips: 8 } : {};
    }
  },
  {
    id: 'greedy_joker',
    name: 'Greedy Joker',
    rarity: 'common',
    price: 5,
    sellValue: 2,
    icon: '💎',
    desc: '每张计分的 ♦ 牌 +3 Mult',
    effect: (ctx) => {
      const cnt = ctx.scoringCards.filter(c => c.suit === '♦').length;
      return cnt > 0 ? { addMult: cnt * 3 } : {};
    }
  },
  {
    id: 'lusty_joker',
    name: 'Lusty Joker',
    rarity: 'common',
    price: 5,
    sellValue: 2,
    icon: '❤️',
    desc: '每张计分的 ♥ 牌 +3 Mult',
    effect: (ctx) => {
      const cnt = ctx.scoringCards.filter(c => c.suit === '♥').length;
      return cnt > 0 ? { addMult: cnt * 3 } : {};
    }
  },
  {
    id: 'wrathful_joker',
    name: 'Wrathful Joker',
    rarity: 'common',
    price: 5,
    sellValue: 2,
    icon: '⚡',
    desc: '每张计分的 ♠ 牌 +3 Mult',
    effect: (ctx) => {

  {

    icon: '✂️',
    desc: '出牌 ≤3 张时 +20 Mult',
    effect: (ctx) => {
      return ctx.scoringCards.length <= 3 ? { addMult: 20 } : {};
    }
  },
  {
    id: 'supernova',
    name: 'Supernova',
    rarity: 'uncommon',
    price: 5,
    sellValue: 2,
    icon: '🌟',
    desc: '将本局该牌型出牌次数加入 Mult',
    effect: (ctx) => {
      // 本 blind 内打出该牌型的次数（不含本次，ctx 里有 playHistory）
      const cnt = (ctx.playHistory || []).filter(k => k === ctx.handType.key).length;
      return cnt > 0 ? { addMult: cnt } : {};
    }
  },
  {
    id: 'cavendish',
    name: 'Cavendish',
    rarity: 'common',
    price: 6,
    sellValue: 3,
    icon: '🍌',
    desc: '×3 Mult，每轮结束有 1/1000 概率自毁',
    effect: (ctx) => ({ xMult: 3 }),
    // 自毁在出牌后由游戏流程检查
    selfDestructChance: 0.001
  }
];

const HAND_SIZE    = 8;
const MAX_SELECT   = 5;
const INIT_HANDS   = 4;
const INIT_DISCARDS= 3;
const MAX_JOKERS   = 5;
const MAX_ANTE     = 3;
const SHOP_REROLL_COST = 5;

// Coming Soon 占位 emoji 列表
const COMING_SOON_EMOJIS = ['🔮','🌍','☀️','🌙','⭐','🌈','💫','🎴'];

// ============================================================
// === 游戏状态（V1 扩展）===
// ============================================================
const state = {
  // V1 保留
  deck: [],
  hand: [],
  selected: [],
  score: 0,
  handsLeft: INIT_HANDS,
  discardsLeft: INIT_DISCARDS,

  // V2 新增
  ante: 1,
  blind: 'small',           // 'small'|'big'|'boss'
  targetScore: 300,
  money: 0,
  jokers: [],               // 已装备的 Joker（实例，含运行时属性）
  currentBoss: null,        // 当前 Boss 配置
  phase: 'blind_select',    // 'blind_select'|'playing'|'cash_out'|'shop'|'boss_intro'|'win'|'lose'
  playHistory: [],          // 本 blind 内已打出的牌型 key
  shopJokers: [],           // 商店当前展示的 Joker（从 JOKER_DB 随机抽）
  shopComingSoonEmoji: '🔮',
  lastCashout: null,        // 上一次结算明细，用于显示
  // 本 Ante 内每个 blind 的状态：'pending' | 'defeated' | 'skipped'
  blindStatus: { small: 'pending', big: 'pending', boss: 'pending' }
};

// ============================================================
// === 工具函数 ===
// ============================================================
function buildDeck() {
  const deck = [];
  for (const suit of SUITS)
    for (const rank of RANKS)
      deck.push({ suit, rank, value: RANK_VALUE[rank] });
  return deck;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function draw(n) {
  return state.deck.splice(0, n);
}

function cardId(c) { return c.suit + c.rank; }

// ============================================================
// === 牌型识别（V1 保留）===
// ============================================================
function evaluateHand(cards) {
  if (!cards || cards.length === 0) return null;
  const ranks  = cards.map(c => c.rank);
  const suits  = cards.map(c => c.suit);
  const counts = {};
  for (const r of ranks) counts[r] = (counts[r]||0)+1;
  const countValues = Object.values(counts).sort((a,b) => b-a);
  const isFlush    = cards.length === 5 && suits.every(s => s === suits[0]);
  const isStraight = checkStraight(ranks);
  const isRoyal    = isStraight && isFlush &&
    ['10','J','Q','K','A'].every(r => ranks.includes(r));

  if (isRoyal)                               return HAND_TYPES.ROYAL_FLUSH;
  if (isStraight && isFlush)                 return HAND_TYPES.STRAIGHT_FLUSH;
  if (countValues[0] === 4)                  return HAND_TYPES.FOUR_KIND;
  if (countValues[0]===3 && countValues[1]===2) return HAND_TYPES.FULL_HOUSE;
  if (isFlush)                               return HAND_TYPES.FLUSH;
  if (isStraight)                            return HAND_TYPES.STRAIGHT;
  if (countValues[0] === 3)                  return HAND_TYPES.THREE_KIND;
  if (countValues[0]===2 && countValues[1]===2) return HAND_TYPES.TWO_PAIR;
  if (countValues[0] === 2)                  return HAND_TYPES.PAIR;
  return HAND_TYPES.HIGH_CARD;
}

function checkStraight(ranks) {
  if (ranks.length !== 5) return false;
  const orders = ranks.map(r => RANK_ORDER[r]).sort((a,b) => a-b);
  if (orders.join(',') === '2,3,4,5,14') return true;
  for (let i = 1; i < orders.length; i++)
    if (orders[i] - orders[i-1] !== 1) return false;
  return true;
}

// === V2: 获取参与计分的牌（对子/三条/四条取重复rank的牌，其余取全部）===
function getScoringCards(cards, handType) {
  const key = handType.key;
  // 高牌只有最高那张参与（简化为全部，与原版有细微差异但功能正确）
  // 实际上在 Balatro 中各牌型都有对应的 scoring cards 逻辑
  // 为简化：除高牌外全部参与，高牌只有最高那张
  if (key === 'HIGH_CARD') {
    const sorted = [...cards].sort((a,b) => RANK_ORDER[b.rank] - RANK_ORDER[a.rank]);
    return [sorted[0]];
  }
  return [...cards];
}

// === V2: 计分管道（三段：chips × mult × xMult）===
function calcScore(selectedCards) {
  const handType = evaluateHand(selectedCards);
  if (!handType) return { handType: null, chips: 0, mult: 1, xMultProduct: 1, score: 0 };

  const scoringCards = getScoringCards(selectedCards, handType);

  // 1. 基础 chips = 牌型 chips + 各计分牌面值
  let chips = handType.chips;
  for (const c of scoringCards) {
    if (!c.debuffed) chips += c.value;
  }

  // 2. 基础 mult
  let mult = handType.mult;

  // 3. Joker 效果（先全部加算 chips & mult，最后乘 xMult）
  let xMultProduct = 1;
  const ctx = {
    hand: state.hand,
    scoringCards,
    handType,
    chips,
    mult,
    playHistory: [...state.playHistory]
  };

  const triggeredJokers = [];
  for (const joker of state.jokers) {
    const result = joker.effect(ctx);
    const { addChips=0, addMult=0, xMult=1 } = result;
    if (addChips !== 0 || addMult !== 0 || xMult !== 1) {
      triggeredJokers.push(joker.id);
    }
    chips += addChips;
    mult  += addMult;
    xMultProduct *= xMult;
    // 更新 ctx 供后续 Joker 参考（部分 Joker 依赖当前 chips/mult）
    ctx.chips = chips;
    ctx.mult  = mult;
  }

  const score = Math.floor(chips * mult * xMultProduct);
  return { handType, chips, mult, xMultProduct, score, triggeredJokers };
}

// ============================================================
// === V2: 金钱结算 ===
// ============================================================
function calcCashout(blindType) {
  const baseReward = BLIND_REWARD[blindType];
  const handsBonus   = state.handsLeft;
  const discardsBonus= state.discardsLeft;
  // 利息：每持有 $5 得 $1，上限 $5
  const interestBase = Math.floor(state.money / 5);
  const interest = Math.min(interestBase, 5);

  const total = baseReward + handsBonus + discardsBonus + interest;
  return {
    baseReward,
    handsBonus,
    discardsBonus,
    interest,
    total
  };
}

// ============================================================
// === V2: 商店辅助 ===
// ============================================================
function generateShopJokers() {
  // 从 JOKER_DB 随机抽 2 张：排除已装备的 id，不重复彼此
  const equippedIds = new Set(state.jokers.map(j => j.id));
  const pool = shuffle(JOKER_DB.slice()).filter(j => !equippedIds.has(j.id));
  const result = [];
  for (const j of pool) {
    if (result.length >= 2) break;
    // 显式强制 purchased: false，防止任何残留状态
    result.push({ ...j, purchased: false });
  }
  // 随机 Coming Soon emoji
  state.shopComingSoonEmoji = COMING_SOON_EMOJIS[Math.floor(Math.random() * COMING_SOON_EMOJIS.length)];
  state.shopJokers = result;
}

// === V2: 工具函数 ===
// ============================================================
function getRandomBoss() {
  return BOSS_BLINDS[Math.floor(Math.random() * BOSS_BLINDS.length)];
}

// 出牌
function playHand() {
  if (state.phase !== 'playing') return;
  if (state.selected.length === 0 || state.handsLeft <= 0) return;

  // Boss The Psychic 检查
  if (state.currentBoss && state.currentBoss.canPlay) {
    if (!state.currentBoss.canPlay(state)) return;
  }

  const { score, handType, chips, mult, xMultProduct, triggeredJokers } = calcScore(state.selected);
  state.score += score;
  state.handsLeft -= 1;

  // 记录牌型历史（Supernova 使用）
  if (handType) state.playHistory.push(handType.key);

  // 移除已出牌
  const usedIds = new Set(state.selected.map(cardId));
  state.hand = state.hand.filter(c => !usedIds.has(cardId(c)));
  state.selected = [];

  // Boss The Hook: 出牌后随机移除 2 张手牌
  if (state.currentBoss && state.currentBoss.onAfterPlay) {
    state.currentBoss.onAfterPlay(state);
  }

  // 补牌
  const need = HAND_SIZE - state.hand.length;
  if (need > 0) state.hand.push(...draw(need));

  // Cavendish 自毁检查
  state.jokers = state.jokers.filter(j => {
    if (j.selfDestructChance && Math.random() < j.selfDestructChance) {
      return false; // 自毁
    }
    return true;
  });

  // 触发 Joker 动画
  if (triggeredJokers && triggeredJokers.length > 0) {
    triggerJokerAnims(triggeredJokers);
  }

  // 判定
  if (state.score >= state.targetScore) {
    // 达到分数 → 结算
    showCashout();
    return;
  } else if (state.handsLeft <= 0) {
    // 出牌耗尽未达分 → 失败
    state.phase = 'lose';
    render();
    return;
  }

  render();
}

// 弃牌
function discard() {
  if (state.phase !== 'playing') return;
  if (state.selected.length === 0 || state.discardsLeft <= 0) return;

  state.discardsLeft -= 1;
  const usedIds = new Set(state.selected.map(cardId));
  state.hand = state.hand.filter(c => !usedIds.has(cardId(c)));
  state.selected = [];
  const need = HAND_SIZE - state.hand.length;
  if (need > 0) state.hand.push(...draw(need));
  render();
}

// 切换选牌
function toggleSelect(card) {
  if (state.phase !== 'playing') return;
  const idx = state.selected.findIndex(c => cardId(c) === cardId(card));
  if (idx >= 0) {
    state.selected.splice(idx, 1);
  } else {
    if (state.selected.length >= MAX_SELECT) return;
    state.selected.push(card);
  }
  render();
}

// 结算：见 showCashout()

// 商店刷新
function rerollShop() {
  if (state.money < SHOP_REROLL_COST) return;
  state.money -= SHOP_REROLL_COST;
  generateShopJokers();
  render();
}

// 商店购买 Joker
function buyJoker(jokerIndex) {
  const shopJoker = state.shopJokers[jokerIndex];
  if (!shopJoker || shopJoker.purchased) return;
  if (state.money < shopJoker.price) return;
  if (state.jokers.length >= MAX_JOKERS) return;

  state.money -= shopJoker.price;
  shopJoker.purchased = true;
  // 装备：深拷贝一份加入 jokers 数组
  state.jokers.push({ ...shopJoker });
  render();
}

// 出售 Joker（点槽位上的出售按钮）
function sellJoker(jokerIndex) {
  if (jokerIndex < 0 || jokerIndex >= state.jokers.length) return;
  const j = state.jokers[jokerIndex];
  state.money += j.sellValue;
  state.jokers.splice(jokerIndex, 1);
  render();
}

// 商店继续：见 shopContinue()

// Joker 触发动画
function triggerJokerAnims(jokerIds) {
  for (const jid of jokerIds) {
    const el = document.querySelector(`.joker-slot[data-id="${jid}"]`);
    if (!el) continue;
    el.classList.remove('triggered');
    // 强制 reflow
    void el.offsetWidth;
    el.classList.add('triggered');
    setTimeout(() => el.classList.remove('triggered'), 350);
  }
}

function createCardEl(card, isSelected, onClick) {
  const div = document.createElement('div');
  const isRed = RED_SUITS.has(card.suit);
  div.className = `poker-card ${isRed ? 'red' : 'black'}${isSelected ? ' selected' : ''}`;
  div.innerHTML = `
    <div class="corner tl"><span class="rank">${card.rank}</span><span class="suit">${card.suit}</span></div>
    <div class="center-suit">${card.suit}</div>
    <div class="corner br"><span class="rank">${card.rank}</span><span class="suit">${card.suit}</span></div>
  `;
  if (onClick) div.addEventListener('click', onClick);
  return div;
}

function renderHUD() {
  el.hudTarget.textContent  = state.targetScore.toLocaleString();
  el.hudScore.textContent   = state.score.toLocaleString();
  el.hudPlays.textContent   = state.handsLeft;
  el.hudDiscards.textContent= state.discardsLeft;
  el.hudMoney.textContent   = `$${state.money}`;

  const blindLabel = {
    small: 'Small Blind',
    big:   'Big Blind',
    boss:  'Boss Blind'
  }[state.blind] || '';
  const isBoss = state.blind === 'boss';
  // Bug B fix: 用 textContent 精确更新子节点，避免 innerHTML 重建导致闪烁
  // hudAnte 的初始 HTML 是 "Ante 1<br><span>Small Blind</span>"
  // 找到第一个文本节点和 span 子节点直接更新
  const anteTextNode = Array.from(el.hudAnte.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
  const anteSpan = el.hudAnte.querySelector('span');
  if (anteTextNode) anteTextNode.textContent = `Ante ${state.ante}`;
  if (anteSpan) {
    anteSpan.textContent = blindLabel;
    anteSpan.className = isBoss ? 'boss-blind-label' : '';
  }
}

function renderJokerSlots() {
  // Bug B fix: 不再每次 innerHTML='' 全量重建，改为按槽位对比更新
  // 避免 legendary-pulse CSS 动画因 DOM 重建而被打断导致闪烁
  const existingSlots = Array.from(el.jokerSlots.querySelectorAll('.joker-slot'));

  for (let i = 0; i < MAX_JOKERS; i++) {
    const j = i < state.jokers.length ? state.jokers[i] : null;
    let slot = existingSlots[i];

    if (j) {
      // 有 Joker：检查现有槽位的 data-id 是否一致，一致则跳过重建
      const sameJoker = slot && slot.dataset.id === String(j.id) && !slot.classList.contains('empty');
      if (!sameJoker) {
        // 需要新建或替换
        const newSlot = document.createElement('div');
        newSlot.className = 'joker-slot';
        newSlot.dataset.rarity = j.rarity;
        newSlot.dataset.id     = j.id;
        newSlot.innerHTML = `
          <div class="j-icon">${j.icon}</div>
          <div class="j-name">${j.name}</div>
          <div class="j-eff">${j.desc}</div>
          <div class="j-sell" title="出售 ($${j.sellValue})">$${j.sellValue}</div>
        `;
        const jIdx = i;
        const sellBtn = newSlot.querySelector('.j-sell');
        if (sellBtn) sellBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          sellJoker(jIdx);
        });
        if (slot) {
          el.jokerSlots.replaceChild(newSlot, slot);
        } else {
          el.jokerSlots.appendChild(newSlot);
        }
      }
      // 同一个 Joker 不重建，保持动画连续
    } else {
      // 空槽位：检查是否已经是 empty 状态
      const alreadyEmpty = slot && slot.classList.contains('empty');
      if (!alreadyEmpty) {
        const newSlot = document.createElement('div');
        newSlot.className = 'joker-slot empty';
        newSlot.textContent = '+';
        if (slot) {
          el.jokerSlots.replaceChild(newSlot, slot);
        } else {
          el.jokerSlots.appendChild(newSlot);
        }
      }
    }
  }

  // 移除多余槽位（如果 MAX_JOKERS 变小，实际上不会发生，保护性处理）
  const currentSlots = el.jokerSlots.querySelectorAll('.joker-slot');
  for (let i = MAX_JOKERS; i < currentSlots.length; i++) {
    el.jokerSlots.removeChild(currentSlots[i]);
  }

  el.jokerFullHint.textContent = state.jokers.length >= MAX_JOKERS
    ? `已满 ${MAX_JOKERS}/${MAX_JOKERS}` : '';
}

function renderPlayingScreen() {
  // 手牌
  el.handCards.innerHTML = '';
  el.handZoneLabel.textContent = `手牌 · ${state.hand.length} 张`;
  for (const card of state.hand) {
    const selected = state.selected.some(c => cardId(c) === cardId(card));
    el.handCards.appendChild(createCardEl(card, selected, () => toggleSelect(card)));
  }

  // 出牌区（选中的牌）
  el.playCards.innerHTML = '';
  const selectedCount = state.selected.length;
  for (let i = 0; i < MAX_SELECT; i++) {
    if (i < selectedCount) {
      const card = state.selected[i];
      const node = createCardEl(card, false, () => toggleSelect(card));
      el.playCards.appendChild(node);
    } else {
      const ph = document.createElement('div');
      ph.className = 'play-placeholder';
      ph.textContent = '+';
      el.playCards.appendChild(ph);
    }
  }

  // 牌型徽章 & 计分预览
  if (selectedCount > 0) {
    const { handType, chips, mult, xMultProduct, score } = calcScore(state.selected);
    el.handTypeBadge.textContent = handType ? handType.name : '';
    el.handTypeBadge.classList.add('visible');
    el.zoneHint.textContent = `已选 ${selectedCount} 张`;

    // 三段计分显示
    let detailHtml = `<span class="score-chips">Chips ${chips}</span> × <span class="score-mult">Mult ${mult}</span>`;
    if (xMultProduct !== 1) {
      detailHtml += ` × <span class="score-xmult">×${xMultProduct.toFixed(1)}</span>`;
    }
    detailHtml += ` = ${score.toLocaleString()}`;
    el.scoreDetail.innerHTML = detailHtml;
  } else {
    el.handTypeBadge.classList.remove('visible');
    el.zoneHint.textContent = '选中 1–5 张牌后点击「出牌」';
    el.scoreDetail.textContent = '';
  }

  // Boss 限制提示
  if (state.currentBoss && state.currentBoss.id === 'the_psychic') {
    if (selectedCount < 5) {
      el.bossHint.textContent = 'The Psychic: 必须选满 5 张才能出牌';
    } else {
      el.bossHint.textContent = '';
    }
  } else if (state.currentBoss && state.currentBoss.id === 'the_hook') {
    el.bossHint.textContent = 'The Hook: 每次出牌后随机丢弃 2 张手牌';
  } else {
    el.bossHint.textContent = '';
  }

  // 按钮可用性
  let canPlay = selectedCount > 0 && state.handsLeft > 0;
  if (canPlay && state.currentBoss && state.currentBoss.canPlay) {
    canPlay = state.currentBoss.canPlay(state);
  }
  el.btnPlay.disabled    = !canPlay;
  el.btnDiscard.disabled = selectedCount === 0 || state.discardsLeft <= 0;
}

// === V2: 渲染盲注选择界面 ===
function renderBlindSelect() {
  el.blindSelectAnteLabel.textContent = `ANTE ${state.ante} / ${MAX_ANTE}`;
  el.blindCardsContainer.innerHTML = '';

  const blindOrder = ['small', 'big', 'boss'];
  // 当前到达的 blind（选完/跳过后 state.blind 会推进，所以这里要展示的是从 small 到 boss 全部）
  // 逻辑：每轮盲注选择界面展示 3 个，玩家只能打"当前 blind"（state.blind）或者跳过
  // 已完成的 blind 不显示，只显示剩余的
  // 简化实现：永远显示 small / big / boss 三张，已完成的灰化

  // 决定当前 blind 序号（0=small, 1=big, 2=boss）
  const curIdx = blindOrder.indexOf(state.blind);

  for (let i = 0; i < blindOrder.length; i++) {
    const btype = blindOrder[i];
    const score = getTargetScore(state.ante, btype);
    const reward = BLIND_REWARD[btype];
    const boss = btype === 'boss' ? state.currentBossForSelect : null;

    const card = document.createElement('div');
    const classMap = { small:'blind-small', big:'blind-big', boss:'blind-boss' };
    card.className = `blind-card ${classMap[btype]}`;

    // 读取该 blind 的真实状态
    const bStatus = (state.blindStatus || {})[btype] || 'pending';

    // 已结束的 blind 卡片灰化
    if (bStatus === 'defeated' || bStatus === 'skipped') {
      card.classList.add('skipped');
    }

    let typeColor = { small:'#4ade80', big:'#d4a017', boss:'#f87171' }[btype];
    let bossEffectHtml = '';
    if (btype === 'boss') {
      // Boss 效果在选择前随机确定（第一次进入 blind_select 时决定）
      const bossInfo = state.pendingBoss || BOSS_BLINDS[0];
      bossEffectHtml = `<div class="blind-boss-effect">${bossInfo.desc.split('\n')[0]}</div>`;
    }

    let btnPlayHtml = '';
    let btnSkipHtml = '';

    if (bStatus === 'defeated') {
      // 玩家打败了这个 blind
      btnPlayHtml = `<div style="font-size:11px;color:#4ade80;font-weight:700;text-align:center">已击败</div>`;
    } else if (bStatus === 'skipped') {
      // 玩家跳过了这个 blind
      btnPlayHtml = `<div style="font-size:11px;color:rgba(255,255,255,.3);text-align:center">已跳过 · 无奖励</div>`;
    } else if (i === curIdx) {
      // pending 且是当前可操作的 blind
      if (btype === 'boss') {
        btnPlayHtml = `<button class="btn-blind btn-blind-boss" onclick="selectBlind('boss')">必须打 →</button>`;
        btnSkipHtml = `<button class="btn-blind btn-blind-disabled" disabled>Boss 不可跳过</button>`;
      } else {
        btnPlayHtml = `<button class="btn-blind btn-blind-play" onclick="selectBlind('${btype}')">打 →</button>`;
        btnSkipHtml = `<button class="btn-blind btn-blind-skip" onclick="skipBlind('${btype}')">跳过（无奖励）</button>`;
      }
    } else {
      // pending 但还没轮到（后续 blind）
      btnPlayHtml = `<div style="font-size:11px;color:rgba(255,255,255,.25);text-align:center">当前不可选</div>`;
    }

    const scoreValClass = btype === 'boss' ? 'val-boss' : 'val';
    card.innerHTML = `
      <div class="blind-type-label" style="color:${typeColor}">${BLIND_TYPE_LABELS[btype]}</div>
      <div class="blind-name">${btype === 'boss' ? (state.pendingBoss||BOSS_BLINDS[0]).name : BLIND_NAMES[btype]}</div>
      <div class="blind-score-line">目标 <span class="${scoreValClass}">${score.toLocaleString()}</span></div>
      <div class="blind-reward-line">奖励 $${reward} + 剩余手牌/弃牌</div>
      ${bossEffectHtml}
      ${btnPlayHtml}
      ${btnSkipHtml}
    `;
    el.blindCardsContainer.appendChild(card);
  }
}

    <div class="cashout-row">
      <span class="cashout-label">打败 ${BLIND_NAMES[co.blindType]}</span>
      <span class="cashout-amount">$${co.baseReward}</span>
    </div>
    ${co.handsBonus > 0 ? `<div class="cashout-row">
      <span class="cashout-label">剩余出牌 × ${co.handsBonus}</span>
      <span class="cashout-amount">$${co.handsBonus}</span>
    </div>` : ''}
    ${co.discardsBonus > 0 ? `<div class="cashout-row">
      <span class="cashout-label">剩余弃牌 × ${co.discardsBonus}</span>
      <span class="cashout-amount">$${co.discardsBonus}</span>
    </div>` : ''}
    ${co.interest > 0 ? `<div class="cashout-row">
      <span class="cashout-label">利息（持有 $${co.prevMoney}）</span>
      <span class="cashout-amount">$${co.interest}</span>
    </div>` : ''}
  `;
  el.cashoutTotalAmt.textContent = `$${co.total}`;
  el.btnCashoutShop.textContent = `领取奖励 ($${co.total})`;

  // 触发进场动画
  requestAnimationFrame(() => {
    el.cashoutPanel.classList.add('show');
  });
}

// === V2: 渲染 Boss 提示卡 ===
function renderBossAlert() {
  const boss = state.currentBossForSelect || BOSS_BLINDS[0];
  el.bossAlertSkull.textContent   = boss.icon;
  el.bossAlertName.textContent    = boss.name;
  el.bossAlertSubtitle.textContent= `BOSS BLIND · ANTE ${state.ante}`;
  el.bossAlertRule.innerHTML      = boss.desc.replace(/\n/g, '<br>');

  requestAnimationFrame(() => {
    el.bossAlertEl.classList.add('show');
  });
}

function hideBossAlert() {
  el.bossAlertEl.classList.remove('show');
}

// === 主渲染函数（按 phase 分发） ===
function render() {
  // 始终更新 HUD
  renderHUD();
  renderJokerSlots();

  // 所有覆盖层先隐藏
  el.blindSelectOverlay.classList.remove('show');
  el.shopOverlay.classList.remove('show');
  el.cashoutOverlay.classList.remove('show');
  el.bossAlertOverlay.classList.remove('show');
  el.modalOverlay.classList.remove('show');

  switch (state.phase) {
    case 'blind_select':
      renderBlindSelect();
      el.blindSelectOverlay.classList.add('show');
      break;

    case 'playing':
      renderPlayingScreen();
      break;

    case 'boss_intro':
      renderBossAlert();
      el.bossAlertOverlay.classList.add('show');
      break;

    case 'cash_out':
      renderCashout();
      el.cashoutOverlay.classList.add('show');
      break;

    case 'shop':
      renderShop();
      el.shopOverlay.classList.add('show');
      break;

    case 'win':
      el.modal.className = 'modal win';
      el.modalTitle.textContent = '通关！';
      el.modalBody.textContent = `你击败了全部 ${MAX_ANTE} 个 Ante\n最终金钱: $${state.money}`;
      el.modalOverlay.classList.add('show');
      break;

    case 'lose':
      el.modal.className = 'modal lose';
      el.modalTitle.textContent = '失败';
      el.modalBody.textContent = `已到达 Ante ${state.ante} · ${BLIND_NAMES[state.blind]}\n出牌次数耗尽`;
      el.modalOverlay.classList.add('show');
      break;
  }
}

// ============================================================
// === 事件绑定 ===
// ============================================================
el.btnPlay.addEventListener('click', playHand);
el.btnDiscard.addEventListener('click', discard);
// Bug3 fix: btnRestart 只在打牌界面有效，lose/win 时 modal 内的 modalRestart 负责重开
el.btnRestart.addEventListener('click', () => { if (state.phase === 'playing') newGame(); });
el.modalRestart.addEventListener('click', newGame);
el.btnCashoutShop.addEventListener('click', proceedToShop);
el.btnShopReroll.addEventListener('click', rerollShop);
el.btnShopContinue.addEventListener('click', shopContinue);
// Bug4 fix: Boss 介绍卡改为玩家手动点击触发进入打牌
el.btnBossStart.addEventListener('click', enterPlaying);

// ============================================================
// === 游戏流程函数 ===
// ============================================================

// 结算：记录结算时的 blind 类型和持有金额，等玩家手动点按钮进商店
function showCashout() {
  state.phase = 'cash_out';
  const prevMoney = state.money;
  const co = calcCashout(state.blind);
  co.blindType = state.blind;
  co.prevMoney = prevMoney;
  state.lastCashout = co;
  state.money += co.total;
  // 标记当前 blind 为已击败
  state.blindStatus[state.blind] = 'defeated';
  render();
}

// 推进盲注：small→big→boss→(ante++, small)
// 推进到 boss 时预确定 Boss 随机效果，让选择界面能提前展示
function advanceBlind() {
  if (state.blind === 'small') {
    state.blind = 'big';
  } else if (state.blind === 'big') {
    state.blind = 'boss';
    // 预确定 Boss，选择界面展示名称和效果
    state.pendingBoss = getRandomBoss();
    state.currentBossForSelect = state.pendingBoss;
  } else {
    // boss 打完 → 进入下一个 Ante
    state.ante += 1;
    state.blind = 'small';
    // 重置本 Ante 三个 blind 的状态
    state.blindStatus = { small: 'pending', big: 'pending', boss: 'pending' };
    // 为新 Ante 预设 Boss
    state.pendingBoss = getRandomBoss();
    state.currentBossForSelect = null;
  }
  state.targetScore = getTargetScore(state.ante, state.blind);
}

// 新游戏：初始化所有状态
function newGame() {
  state.deck                = shuffle(buildDeck());
  state.hand                = [];
  state.selected            = [];
  state.score               = 0;
  state.handsLeft           = INIT_HANDS;
  state.discardsLeft        = INIT_DISCARDS;
  state.ante                = 1;
  state.blind               = 'small';
  state.targetScore         = getTargetScore(1, 'small');
  state.money               = 0;
  state.jokers              = [];
  state.currentBoss         = null;
  state.currentBossForSelect = null;
  state.pendingBoss         = getRandomBoss();
  state.playHistory         = [];
  state.shopJokers          = [];
  state.lastCashout         = null;
  // 每个 blind 的状态：'pending' | 'defeated' | 'skipped'
  state.blindStatus         = { small: 'pending', big: 'pending', boss: 'pending' };
  state.phase               = 'blind_select';
  render();
}

// 进入打牌状态（从盲注选择或 Boss 提示后）
function enterPlaying() {
  state.deck         = shuffle(buildDeck());
  state.hand         = draw(HAND_SIZE);
  state.selected     = [];
  state.score        = 0;
  state.handsLeft    = INIT_HANDS;
  state.discardsLeft = INIT_DISCARDS;
  state.playHistory  = [];

  if (state.blind === 'boss') {
    // 使用预确定的 Boss（不再重新随机，保证选择界面与实际一致）
    state.currentBoss = state.pendingBoss || getRandomBoss();
    state.currentBossForSelect = state.currentBoss;
  } else {
    state.currentBoss = null;
  }

  state.phase = 'playing';
  render();
}

// 玩家选中某个 blind 开始打
function selectBlind(blindType) {
  state.blind = blindType;
  state.targetScore = getTargetScore(state.ante, state.blind);

  if (state.blind === 'boss') {
    state.phase = 'boss_intro';
    render();
  } else {
    enterPlaying();
  }
}

// 跳过 blind（Small/Big 才能跳过）：标记为 skipped，直接进商店
function skipBlind(blindType) {
  state.blindStatus[blindType] = 'skipped';
  state.lastCashout = null; // 跳过无结算
  advanceBlind();
  generateShopJokers();
  state.phase = 'shop';
  render();
}

// 从结算面板进入商店（玩家点按钮触发）
function proceedToShop() {
  el.cashoutPanel.classList.remove('show');

  // 推进 blind（small→big→boss→下一 ante）
  advanceBlind();

  // 通关判断
  if (state.ante > MAX_ANTE) {
    state.phase = 'win';
    render();
    return;
  }

  generateShopJokers();
  state.phase = 'shop';
  render();
}

// 商店"继续"：回到盲注选择界面
function shopContinue() {
  state.phase = 'blind_select';
  render();
}

// ============================================================
// === 启动 ===
// ============================================================
newGame();
</script>

</body>
</html>
